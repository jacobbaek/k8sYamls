apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-https-htmlcm
data:
  index.html: |
    <!doctype html>
    <head>
      <meta charset="utf-8"/>
      <title>nginx HTTPS Demo</title>
      <style>body{font-family:system-ui,Arial,sans-serif;margin:40px;color:#1f2937}</style>
    </head>
    <body>
      <h1>NGINX HTTPS works well</h1>
      <pre>
      Host: $host
      URI:  $request_uri
      Time: $time_local
      </pre>
    </body>
    </html>
#---
#apiVersion: v1
#kind: Secret
#metadata:
#  name: nginx-https-tls
#type: kubernetes.io/tls
#data:
#  # input the cert/key that encoded base64
#  # Ex) tls.crt: <base64-of-cert>, tls.key: <base64-of-key>
#  tls.crt: "xxx"
#  tls.key: "xxx"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-https-configcm
data:
  default.conf: |
    server {
      listen       80;
      server_name  _;

      return 301 https://$host$request_uri;
    }
    
    server {
      listen 443 ssl;
      server_name _;
      
      ssl_certificate      /etc/nginx/tls/tls.crt;
      ssl_certificate_key  /etc/nginx/tls/tls.key;
      ssl_protocols        TLSv1.2 TLSv1.3;
      ssl_prefer_server_ciphers on;

      root /usr/share/nginx/html;
      index index.html;

      #location / {
      #  try_files $uri $uri/ =404;
      #}
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-https
spec:
  selector:
    matchLabels:
      app: nginx-https
  replicas: 2
  template:
    metadata:
      labels:
        app: nginx-https
    spec:
      containers:
      - image: nginx:1.25-alpine
        name: nginx
        ports:
          - containerPort: 80
            name: http
          - containerPort: 443
            name: https
        readinessProbe:
          httpGet:
            scheme: HTTPS
            path: /
            port: 443
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            scheme: HTTPS
            path: /
            port: 443
          initialDelaySeconds: 10
          periodSeconds: 20
        volumeMounts:
          - name: nginx-html
            mountPath: /usr/share/nginx/html/index.html
            subPath: index.html
          - name: config
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: default.conf
          - name: tls
            mountPath: /etc/nginx/tls
            readOnly: true
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
        - name: nginx-html
          configMap:
            name: nginx-https-htmlcm
        - name: config
          configMap:
            name: nginx-https-configcm
        - name: tls
          secret:
            secretName: nginx-https-tls
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-https-svc
spec:
  selector:
    app: nginx-https
  type: LoadBalancer
  ports:
    - name: https
      port: 443
      targetPort: 443
    - name: http
      port: 80
      targetPort: 80

