apiVersion: v1
kind: Namespace
metadata:
  name: nginx-sample
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nginx-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: nginx-sample
spec:
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
