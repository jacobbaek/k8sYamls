apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-unsafe
spec:
  selector:
    matchLabels:
      app: nginx-unsafe
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx-unsafe
    spec:
      containers:
      - image: nginx:latest
        name: nginx
        ports:
        - containerPort: 80
          protocol: TCP
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        sysctls:
        - name: net.ipv4.tcp_retries2
          value: "5"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-unsafe-svc
spec:
  selector:
    app: nginx-unsafe
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    appProtocol: http
